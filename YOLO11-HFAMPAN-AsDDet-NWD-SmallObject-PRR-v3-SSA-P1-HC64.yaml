  - [-1, 1, C2f, [512, False]]                        # 13

  - [-1, 1, Conv, [256, 1, 1]]                        # 14
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]        # 15
  - [[-1, 4], 1, Concat, [1]]                         # 16
  - [-1, 2, C2f, [256, False]]                        # 17

  - [-1, 1, Conv, [128, 1, 1]]                        # 18
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]        # 19
  - [[-1, 2], 1, Concat, [1]]                         # 20
  - [-1, 3, C2f, [128, False]]                        # 21

  # ===== HFAMPAN 金字塔聚合 =====
  - [[-1, -4, -8, 9], 1, PyramidPoolAgg, [512, 2, 'torch']]  # 22

  # ===== P2 输出分支 =====
  - [21, 1, TopBasicLayer, [128]]                      # 23
  - [[23, 21], 1, LAF_h, []]                           # 24
  - [[-1, 22], 1, InjectionMultiSum_Auto_pool2, [128]] # 25
  - [-1, 3, RepBlock, [128]]                           # 26

  # ===== P3 输出分支 =====
  - [17, 1, TopBasicLayer, [256]]                      # 27
  - [[27, 17], 1, LAF_h, []]                           # 28
  - [[-1, 22], 1, InjectionMultiSum_Auto_pool3, [256]] # 29
  - [-1, 3, RepBlock, [256]]                           # 30

  # ===== P4 输出分支 =====
  - [[30, 13], 1, LAF_h, []]                           # 31
  - [[-1, 22], 1, InjectionMultiSum_Auto_pool4, [512]] # 32
  - [-1, 2, RepBlock, [512]]                           # 33

  # ===== PRR: grid_sample 局部重聚焦 =====
  - [26, 1, RefocusSingle, [gridsample]]               # 34
  - [30, 1, RefocusSingle, [gridsample]]               # 35

  # ===== 小目标增强 =====
