# YOLO11 小目标检测 PRR v3-SSA-P1-HC64
#
# H1 验证原则：
# 1. 严格继承 P1 结构，不动建桥层和 P1 精简结论
# 2. 只扩展 SAC 输出通道，用于验证 P3 容量瓶颈
# 3. 目标是将 AsDDet 输入从 [32, 32, 128] 提升为 [32, 64, 128]

nc: 80
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

loss: NWD

backbone:
  - [-1, 1, Conv, [64, 3, 2]]          # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]         # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25, 1, True, True, True, False, 1]]  # 2: shallow, Sobel only
  - [-1, 1, Conv, [256, 3, 2]]         # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25, 1, True, True, True, True, 2]]   # 4: mid, Sobel + SAConv(d=2)
  - [-1, 1, Conv, [512, 3, 2]]         # 5-P4/16
  - [-1, 2, C3k2, [512, True, 0.5, 1, True, True, True, True, 3]]     # 6: deep, Sobel + SAConv(d=3)
  - [-1, 1, Conv, [1024, 3, 2]]        # 7-P5/32
  - [-1, 2, C3k2, [1024, True, 0.5, 1, True, True, True, True, 3]]    # 8: deep, Sobel + SAConv(d=3)
  - [-1, 1, SPPF, [1024, 5]]           # 9

head:
  # ===== FPN top-down =====
  - [-1, 1, Conv, [512, 1, 1]]                        # 10
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]        # 11
